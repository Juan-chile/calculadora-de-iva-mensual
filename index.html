<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Registro IVA Mensual</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f5f2ec;
  --surface:#ffffff;
  --surface2:#faf8f3;
  --border:#d9d4c7;
  --border2:#c8c2b2;
  --accent:#1a4a2e;
  --accent2:#c8471a;
  --accent3:#e8c84a;
  --text:#1c1a16;
  --muted:#7a7464;
  --green:#1a6b3a;
  --green-bg:#e8f5ee;
  --red-bg:#fdf0ec;
  --total-bg:#1a4a2e;
  --total-text:#f5f2ec;
  --shadow:0 2px 12px rgba(26,22,16,0.08);
  --radius:3px;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'IBM Plex Mono',monospace;
  min-height:100vh;
  padding:1rem;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(26,74,46,0.04) 39px,rgba(26,74,46,0.04) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(26,74,46,0.04) 39px,rgba(26,74,46,0.04) 40px);
}

/* ── LAYOUT ── */
.app{max-width:900px;margin:0 auto}

/* ── HEADER ── */
.app-header{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:1rem;
  margin-bottom:1.5rem;
  padding-bottom:1rem;
  border-bottom:2px solid var(--accent);
}
.header-left{}
.header-eyebrow{
  font-size:0.6rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--accent2);
  margin-bottom:0.3rem;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,5vw,2.4rem);
  font-weight:900;
  line-height:1;
  color:var(--accent);
}
h1 span{color:var(--accent2)}
.header-meta{
  font-size:0.65rem;
  color:var(--muted);
  margin-top:0.3rem;
}

/* ── RATE & MONTH BAR ── */
.config-bar{
  display:flex;
  gap:0.75rem;
  flex-wrap:wrap;
  margin-bottom:1.25rem;
  align-items:flex-end;
}
.config-field{display:flex;flex-direction:column;gap:0.3rem}
.config-field label{font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.config-field select,
.config-field input[type="number"],
.config-field input[type="month"]{
  padding:0.45rem 0.65rem;
  background:var(--surface);
  border:1px solid var(--border2);
  color:var(--text);
  font-family:'IBM Plex Mono',monospace;
  font-size:0.82rem;
  outline:none;
  border-radius:var(--radius);
  transition:border-color 0.15s;
  -webkit-appearance:none;
}
.config-field select:focus,
.config-field input:focus{border-color:var(--accent)}
.config-field input[type="number"]{width:90px}

/* ── INPUT CARD ── */
.input-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-top:3px solid var(--accent2);
  padding:1.25rem;
  margin-bottom:1.25rem;
  box-shadow:var(--shadow);
  border-radius:var(--radius);
}
.input-card-title{
  font-size:0.65rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:1rem;
}
.input-row{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:0.75rem;
  align-items:flex-end;
  flex-wrap:wrap;
}
@media(max-width:520px){
  .input-row{grid-template-columns:1fr 1fr;row-gap:0.75rem}
  .input-row .btn-add{grid-column:1/-1}
}
.input-field{display:flex;flex-direction:column;gap:0.3rem}
.input-field label{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
.input-field input{
  padding:0.6rem 0.75rem;
  background:var(--surface2);
  border:1px solid var(--border2);
  color:var(--text);
  font-family:'IBM Plex Mono',monospace;
  font-size:0.9rem;
  outline:none;
  border-radius:var(--radius);
  transition:border-color 0.15s;
  width:100%;
}
.input-field input:focus{border-color:var(--accent2);background:#fff}
.preview-chips{
  display:flex;
  gap:0.5rem;
  flex-wrap:wrap;
  margin-top:0.75rem;
  font-size:0.72rem;
  color:var(--muted);
}
.chip{
  background:var(--surface2);
  border:1px solid var(--border);
  padding:3px 10px;
  border-radius:20px;
}
.chip strong{color:var(--green)}

.btn-add{
  padding:0.6rem 1.25rem;
  background:var(--accent);
  border:none;
  color:#fff;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.78rem;
  font-weight:600;
  letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:var(--radius);
  transition:all 0.15s;
  white-space:nowrap;
  align-self:flex-end;
}
.btn-add:hover{background:#1f5c38;transform:translateY(-1px)}
.btn-add:active{transform:translateY(0)}

/* ── TABLE SECTION ── */
.table-section{
  background:var(--surface);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
  overflow:hidden;
  margin-bottom:1.25rem;
}
.table-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0.75rem 1rem;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
  flex-wrap:wrap;
  gap:0.5rem;
}
.table-title{
  font-size:0.65rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--muted);
}
.record-count{
  font-size:0.7rem;
  color:var(--accent);
  font-weight:600;
}
.btn-clear-all{
  padding:0.3rem 0.75rem;
  background:transparent;
  border:1px solid var(--accent2);
  color:var(--accent2);
  font-family:'IBM Plex Mono',monospace;
  font-size:0.65rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:var(--radius);
  transition:all 0.15s;
}
.btn-clear-all:hover{background:var(--accent2);color:#fff}

/* Table scroll wrapper */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

table{
  width:100%;
  border-collapse:collapse;
  font-size:0.8rem;
  min-width:480px;
}
thead tr{background:var(--accent);color:#fff}
thead th{
  padding:0.6rem 0.9rem;
  text-align:right;
  font-weight:500;
  font-size:0.65rem;
  letter-spacing:0.1em;
  text-transform:uppercase;
  white-space:nowrap;
}
thead th:first-child{text-align:left}
thead th:last-child{text-align:center;width:60px}

tbody tr{
  border-bottom:1px solid var(--border);
  transition:background 0.1s;
  animation:rowIn 0.25s ease both;
}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}

@keyframes rowIn{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:translateY(0)}
}

td{
  padding:0.55rem 0.9rem;
  text-align:right;
  vertical-align:middle;
  white-space:nowrap;
}
td:first-child{text-align:left;color:var(--muted);font-size:0.75rem}
td.amt{color:var(--text);font-weight:500}
td.net{color:var(--green)}
td.tax{color:var(--accent2)}
td.actions{text-align:center;padding:0.4rem}

.btn-del{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  cursor:pointer;
  font-size:0.8rem;
  padding:3px 8px;
  border-radius:var(--radius);
  transition:all 0.15s;
  font-family:'IBM Plex Mono',monospace;
}
.btn-del:hover{border-color:var(--accent2);color:var(--accent2);background:var(--red-bg)}

/* TOTAL ROW */
tfoot tr{background:var(--total-bg);color:var(--total-text)}
tfoot td{
  padding:0.8rem 0.9rem;
  font-weight:600;
  font-size:0.82rem;
}
tfoot td:first-child{
  font-family:'Playfair Display',serif;
  font-size:0.85rem;
  font-weight:700;
  letter-spacing:0.05em;
}
tfoot td.t-net{color:#7dd4a0}
tfoot td.t-tax{color:#f4a87a}

/* Empty state */
.empty-state{
  text-align:center;
  padding:2.5rem 1rem;
  color:var(--muted);
}
.empty-state .empty-icon{font-size:2rem;margin-bottom:0.5rem;opacity:0.4}
.empty-state p{font-size:0.75rem;line-height:1.7}

/* ── TOAST ── */
.toast{
  position:fixed;
  bottom:1.5rem;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--accent);
  color:#fff;
  padding:0.6rem 1.25rem;
  font-size:0.75rem;
  border-radius:30px;
  opacity:0;
  transition:all 0.3s;
  pointer-events:none;
  z-index:999;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  body{padding:0.75rem}
  .config-bar{gap:0.5rem}
  .input-card{padding:1rem}
  .app-header{margin-bottom:1rem}
  table{font-size:0.72rem}
  thead th,td{padding:0.5rem 0.6rem}
}
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <div class="header-eyebrow">Herramienta fiscal</div>
      <h1>Registro <span>IVA</span></h1>
      <div class="header-meta">Ingreso diario · Acumulado mensual</div>
    </div>
  </header>

  <!-- CONFIG -->
  <div class="config-bar">
    <div class="config-field">
      <label>Mes a registrar</label>
      <input type="month" id="monthPicker"/>
    </div>
    <div class="config-field">
      <label>Tasa IVA</label>
      <select id="rateSel">
        <option value="19">19% — Chile</option>
        <option value="16">16% — México</option>
        <option value="21">21% — Argentina</option>
        <option value="12">12% — Ecuador</option>
        <option value="custom">Personalizada</option>
      </select>
    </div>
    <div class="config-field" id="customRateField" style="display:none">
      <label>Tasa %</label>
      <input type="number" id="customRateInput" placeholder="ej. 10" min="0" max="100" step="0.1"/>
    </div>
  </div>

  <!-- INPUT CARD -->
  <div class="input-card">
    <div class="input-card-title">➕ Agregar registro del día</div>
    <div class="input-row">
      <div class="input-field">
        <label>Fecha</label>
        <input type="date" id="entryDate"/>
      </div>
      <div class="input-field">
        <label>Monto total con IVA ($)</label>
        <input type="number" id="entryAmount" placeholder="ej. 30000" min="0" step="1"/>
      </div>
      <button class="btn-add" onclick="addEntry()">Agregar</button>
    </div>
    <div class="preview-chips" id="previewChips" style="display:none">
      <span class="chip">Neto: <strong id="prevNet">—</strong></span>
      <span class="chip">IVA: <strong id="prevTax">—</strong></span>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <div class="table-header">
      <div>
        <div class="table-title" id="tableTitle">Registros del mes</div>
        <div class="record-count" id="recordCount">0 registros</div>
      </div>
      <button class="btn-clear-all" onclick="clearAll()">🗑 Limpiar todo</button>
    </div>
    <div class="table-scroll">
      <table id="mainTable">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Total con IVA</th>
            <th>Neto sin IVA</th>
            <th>IVA</th>
            <th>—</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot id="tableFoot"></tfoot>
      </table>
    </div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <p>No hay registros para este mes.<br>Agrega el primer monto arriba.</p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let entries = {}; // { "YYYY-MM": [ {date, amount, net, tax}, ... ] }
let currentMonth = '';
let currentRate = 19;

const STORAGE_KEY = 'iva_entries_v1';

// ── INIT ──
function init(){
  // Load from localStorage
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) entries = JSON.parse(saved);
  } catch(e){ entries = {}; }

  // Set month picker to current month
  const now = new Date();
  const ym = now.toISOString().slice(0,7);
  document.getElementById('monthPicker').value = ym;
  currentMonth = ym;

  // Set date to today
  document.getElementById('entryDate').value = now.toISOString().slice(0,10);

  // Rate selector
  document.getElementById('rateSel').addEventListener('change', onRateChange);
  document.getElementById('customRateInput').addEventListener('input', onRateChange);
  document.getElementById('monthPicker').addEventListener('change', e => {
    currentMonth = e.target.value;
    renderTable();
  });
  document.getElementById('entryAmount').addEventListener('input', updatePreview);

  renderTable();
}

function onRateChange(){
  const sel = document.getElementById('rateSel').value;
  const customField = document.getElementById('customRateField');
  if(sel === 'custom'){
    customField.style.display = 'flex';
    currentRate = parseFloat(document.getElementById('customRateInput').value) || 0;
  } else {
    customField.style.display = 'none';
    currentRate = parseFloat(sel);
  }
  updatePreview();
  renderTable();
}

function getRate(){
  const sel = document.getElementById('rateSel').value;
  if(sel === 'custom') return parseFloat(document.getElementById('customRateInput').value) || 0;
  return parseFloat(sel);
}

function calcFromGross(gross){
  const r = getRate() / 100;
  const net = gross / (1 + r);
  const tax = gross - net;
  return { net: Math.round(net), tax: Math.round(tax) };
}

function updatePreview(){
  const raw = parseFloat(document.getElementById('entryAmount').value);
  const chips = document.getElementById('previewChips');
  if(!raw || raw <= 0){ chips.style.display='none'; return; }
  const {net, tax} = calcFromGross(raw);
  document.getElementById('prevNet').textContent = fmt(net);
  document.getElementById('prevTax').textContent = fmt(tax);
  chips.style.display = 'flex';
}

// ── ADD ──
function addEntry(){
  const dateVal = document.getElementById('entryDate').value;
  const amountVal = parseFloat(document.getElementById('entryAmount').value);
  if(!dateVal){ showToast('Selecciona una fecha'); return; }
  if(!amountVal || amountVal <= 0){ showToast('Ingresa un monto válido'); return; }
  const rate = getRate();
  if(!rate || rate <= 0){ showToast('Define una tasa de IVA válida'); return; }

  const {net, tax} = calcFromGross(amountVal);
  const entryMonth = dateVal.slice(0,7);

  if(!entries[entryMonth]) entries[entryMonth] = [];

  // Check duplicate date — ask / allow multiple per day
  entries[entryMonth].push({ date: dateVal, amount: Math.round(amountVal), net, tax });
  entries[entryMonth].sort((a,b) => a.date.localeCompare(b.date));

  save();
  currentMonth = entryMonth;
  document.getElementById('monthPicker').value = entryMonth;
  renderTable();
  document.getElementById('entryAmount').value = '';
  document.getElementById('previewChips').style.display = 'none';
  showToast('✓ Registro agregado');
}

// ── DELETE ──
function deleteEntry(month, idx){
  if(!entries[month]) return;
  entries[month].splice(idx, 1);
  if(entries[month].length === 0) delete entries[month];
  save();
  renderTable();
  showToast('Registro eliminado');
}

// ── CLEAR ALL ──
function clearAll(){
  if(!entries[currentMonth] || entries[currentMonth].length === 0){ showToast('No hay registros este mes'); return; }
  if(!confirm(`¿Eliminar todos los registros de ${fmtMonth(currentMonth)}?`)) return;
  delete entries[currentMonth];
  save();
  renderTable();
  showToast('Mes limpiado');
}

// ── SAVE ──
function save(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e){}
}

// ── RENDER ──
function renderTable(){
  const month = document.getElementById('monthPicker').value || currentMonth;
  const rows = entries[month] || [];
  const tbody = document.getElementById('tableBody');
  const tfoot = document.getElementById('tableFoot');
  const emptyState = document.getElementById('emptyState');
  const recordCount = document.getElementById('recordCount');
  const tableTitle = document.getElementById('tableTitle');

  tableTitle.textContent = `Registros — ${fmtMonth(month)}`;
  recordCount.textContent = rows.length + (rows.length === 1 ? ' registro' : ' registros');

  if(rows.length === 0){
    tbody.innerHTML = '';
    tfoot.innerHTML = '';
    emptyState.style.display = 'block';
    document.getElementById('mainTable').style.display = 'none';
    return;
  }
  emptyState.style.display = 'none';
  document.getElementById('mainTable').style.display = 'table';

  tbody.innerHTML = rows.map((r,i) => `
    <tr>
      <td>${fmtDate(r.date)}</td>
      <td class="amt">$ ${fmt(r.amount)}</td>
      <td class="net">$ ${fmt(r.net)}</td>
      <td class="tax">$ ${fmt(r.tax)}</td>
      <td class="actions">
        <button class="btn-del" onclick="deleteEntry('${month}',${i})" title="Eliminar">✕</button>
      </td>
    </tr>
  `).join('');

  const totAmount = rows.reduce((s,r)=>s+r.amount,0);
  const totNet    = rows.reduce((s,r)=>s+r.net,0);
  const totTax    = rows.reduce((s,r)=>s+r.tax,0);

  tfoot.innerHTML = `
    <tr>
      <td>TOTAL ${fmtMonth(month)}</td>
      <td>$ ${fmt(totAmount)}</td>
      <td class="t-net">$ ${fmt(totNet)}</td>
      <td class="t-tax">$ ${fmt(totTax)}</td>
      <td></td>
    </tr>
  `;
}

// ── HELPERS ──
function fmt(n){
  return Math.round(n).toLocaleString('es-CL');
}

function fmtDate(d){
  const [y,m,day] = d.split('-');
  return `${day}-${m}-${y}`;
}

function fmtMonth(ym){
  if(!ym) return '';
  const [y,m] = ym.split('-');
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${months[parseInt(m)-1]} ${y}`;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

init();
</script>
</body>
</html>
