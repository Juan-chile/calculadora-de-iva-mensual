<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Registro IVA Mensual</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <div class="header-eyebrow">Herramienta fiscal</div>
      <h1>Registro <span>IVA</span></h1>
      <div class="header-meta">Ingreso diario · Acumulado mensual</div>
    </div>
  </header>

  <!-- CONFIG -->
  <div class="config-bar">
    <div class="config-field">
      <label>Mes a registrar</label>
      <input type="month" id="monthPicker"/>
    </div>
    <div class="config-field">
      <label>Tasa IVA</label>
      <select id="rateSel">
        <option value="19">19% — Chile</option>
        <option value="16">16% — México</option>
        <option value="21">21% — Argentina</option>
        <option value="12">12% — Ecuador</option>
        <option value="custom">Personalizada</option>
      </select>
    </div>
    <div class="config-field" id="customRateField" style="display:none">
      <label>Tasa %</label>
      <input type="number" id="customRateInput" placeholder="ej. 10" min="0" max="100" step="0.1"/>
    </div>
  </div>

  <!-- INPUT CARD -->
  <div class="input-card">
    <div class="input-card-title">➕ Agregar registro del día</div>
    <div class="input-row">
      <div class="input-field">
        <label>Fecha</label>
        <input type="date" id="entryDate"/>
      </div>
      <div class="input-field">
        <label>Monto total con IVA ($)</label>
        <input type="number" id="entryAmount" placeholder="ej. 30000" min="0" step="1"/>
      </div>
      <button class="btn-add" onclick="addEntry()">Agregar</button>
    </div>
    <div class="preview-chips" id="previewChips" style="display:none">
      <span class="chip">Neto: <strong id="prevNet">—</strong></span>
      <span class="chip">IVA: <strong id="prevTax">—</strong></span>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-section">
    <div class="table-header">
      <div>
        <div class="table-title" id="tableTitle">Registros del mes</div>
        <div class="record-count" id="recordCount">0 registros</div>
      </div>
      <div style="display:flex;gap:0.5rem">
        <button class="btn-export" onclick="exportToExcel()" title="Exportar CSV">📊 Exportar CSV</button>
        <button class="btn-clear-all" onclick="clearAll()">🗑 Limpiar todo</button>
      </div>
    </div>
    <div class="table-scroll">
      <table id="mainTable">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Total con IVA</th>
            <th>Neto sin IVA</th>
            <th>IVA</th>
            <th>—</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
        <tfoot id="tableFoot"></tfoot>
      </table>
    </div>
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <p>No hay registros para este mes.<br>Agrega el primer monto arriba.</p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── STATE ──
let entries = {}; // { "YYYY-MM": [ {date, amount, net, tax}, ... ] }
let currentMonth = '';
let currentRate = 19;

const STORAGE_KEY = 'iva_entries_v1';

// ── INIT ──
function init(){
  // Load from localStorage
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(saved) entries = JSON.parse(saved);
  } catch(e){ entries = {}; }

  // Set month picker to current month
  const now = new Date();
  const ym = now.toISOString().slice(0,7);
  document.getElementById('monthPicker').value = ym;
  currentMonth = ym;

  // Set date to today
  document.getElementById('entryDate').value = now.toISOString().slice(0,10);

  // Rate selector
  document.getElementById('rateSel').addEventListener('change', onRateChange);
  document.getElementById('customRateInput').addEventListener('input', onRateChange);
  document.getElementById('monthPicker').addEventListener('change', e => {
    currentMonth = e.target.value;
    renderTable();
  });
  document.getElementById('entryAmount').addEventListener('input', updatePreview);

  renderTable();
}

function onRateChange(){
  const sel = document.getElementById('rateSel').value;
  const customField = document.getElementById('customRateField');
  if(sel === 'custom'){
    customField.style.display = 'flex';
    currentRate = parseFloat(document.getElementById('customRateInput').value) || 0;
  } else {
    customField.style.display = 'none';
    currentRate = parseFloat(sel);
  }
  updatePreview();
  renderTable();
}

function getRate(){
  const sel = document.getElementById('rateSel').value;
  if(sel === 'custom') return parseFloat(document.getElementById('customRateInput').value) || 0;
  return parseFloat(sel);
}

function calcFromGross(gross){
  const r = getRate() / 100;
  const net = gross / (1 + r);
  const tax = gross - net;
  return { net: Math.round(net), tax: Math.round(tax) };
}

function updatePreview(){
  const raw = parseFloat(document.getElementById('entryAmount').value);
  const chips = document.getElementById('previewChips');
  if(!raw || raw <= 0){ chips.style.display='none'; return; }
  const {net, tax} = calcFromGross(raw);
  document.getElementById('prevNet').textContent = fmt(net);
  document.getElementById('prevTax').textContent = fmt(tax);
  chips.style.display = 'flex';
}

// ── ADD ──
function addEntry(){
  const dateVal = document.getElementById('entryDate').value;
  const amountVal = parseFloat(document.getElementById('entryAmount').value);
  if(!dateVal){ showToast('Selecciona una fecha'); return; }
  if(!amountVal || amountVal <= 0){ showToast('Ingresa un monto válido'); return; }
  const rate = getRate();
  if(!rate || rate <= 0){ showToast('Define una tasa de IVA válida'); return; }

  const {net, tax} = calcFromGross(amountVal);
  const entryMonth = dateVal.slice(0,7);

  if(!entries[entryMonth]) entries[entryMonth] = [];

  // Check duplicate date — ask / allow multiple per day
  entries[entryMonth].push({ date: dateVal, amount: Math.round(amountVal), net, tax });
  entries[entryMonth].sort((a,b) => a.date.localeCompare(b.date));

  save();
  currentMonth = entryMonth;
  document.getElementById('monthPicker').value = entryMonth;
  renderTable();
  document.getElementById('entryAmount').value = '';
  document.getElementById('previewChips').style.display = 'none';
  showToast('✓ Registro agregado');
}

// ── DELETE ──
function deleteEntry(month, idx){
  if(!entries[month]) return;
  entries[month].splice(idx, 1);
  if(entries[month].length === 0) delete entries[month];
  save();
  renderTable();
  showToast('Registro eliminado');
}

// ── CLEAR ALL ──
function clearAll(){
  if(!entries[currentMonth] || entries[currentMonth].length === 0){ showToast('No hay registros este mes'); return; }
  if(!confirm(`¿Eliminar todos los registros de ${fmtMonth(currentMonth)}?`)) return;
  delete entries[currentMonth];
  save();
  renderTable();
  showToast('Mes limpiado');
}

// ── SAVE ──
function save(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e){}
}

// ── RENDER ──
function renderTable(){
  const month = document.getElementById('monthPicker').value || currentMonth;
  const rows = entries[month] || [];
  const tbody = document.getElementById('tableBody');
  const tfoot = document.getElementById('tableFoot');
  const emptyState = document.getElementById('emptyState');
  const recordCount = document.getElementById('recordCount');
  const tableTitle = document.getElementById('tableTitle');

  tableTitle.textContent = `Registros — ${fmtMonth(month)}`;
  recordCount.textContent = rows.length + (rows.length === 1 ? ' registro' : ' registros');

  if(rows.length === 0){
    tbody.innerHTML = '';
    tfoot.innerHTML = '';
    emptyState.style.display = 'block';
    document.getElementById('mainTable').style.display = 'none';
    return;
  }
  emptyState.style.display = 'none';
  document.getElementById('mainTable').style.display = 'table';

  tbody.innerHTML = rows.map((r,i) => `
    <tr>
      <td>${fmtDate(r.date)}</td>
      <td class="amt">$ ${fmt(r.amount)}</td>
      <td class="net">$ ${fmt(r.net)}</td>
      <td class="tax">$ ${fmt(r.tax)}</td>
      <td class="actions">
        <button class="btn-del" onclick="deleteEntry('${month}',${i})" title="Eliminar">✕</button>
      </td>
    </tr>
  `).join('');

  const totAmount = rows.reduce((s,r)=>s+r.amount,0);
  const totNet    = rows.reduce((s,r)=>s+r.net,0);
  const totTax    = rows.reduce((s,r)=>s+r.tax,0);

  tfoot.innerHTML = `
    <tr>
      <td>TOTAL ${fmtMonth(month)}</td>
      <td>$ ${fmt(totAmount)}</td>
      <td class="t-net">$ ${fmt(totNet)}</td>
      <td class="t-tax">$ ${fmt(totTax)}</td>
      <td></td>
    </tr>
  `;
}

// ── HELPERS ──
function fmt(n){
  return Math.round(n).toLocaleString('es-CL');
}

function fmtDate(d){
  const [y,m,day] = d.split('-');
  return `${day}-${m}-${y}`;
}

function fmtMonth(ym){
  if(!ym) return '';
  const [y,m] = ym.split('-');
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${months[parseInt(m)-1]} ${y}`;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── EXPORT TO EXCEL ──
function exportToExcel(){
  const month = document.getElementById('monthPicker').value || currentMonth;
  const rows = entries[month] || [];
  
  if(rows.length === 0){
    showToast('No hay registros para exportar');
    return;
  }
  
  const rate = getRate();
  const monthName = fmtMonth(month);
  const filename = `Registros_IVA_${month}.csv`;
  
  const csvData = [
    ['Registro de IVA - ' + monthName],
    ['Tasa IVA: ' + rate + '%'],
    [],
    ['Fecha', 'Total con IVA', 'Neto sin IVA', 'IVA'],
  ];
  
  rows.forEach(r => {
    csvData.push([
      r.date,
      r.amount,
      r.net,
      r.tax
    ]);
  });
  
  const totAmount = rows.reduce((s,r)=>s+r.amount,0);
  const totNet    = rows.reduce((s,r)=>s+r.net,0);
  const totTax    = rows.reduce((s,r)=>s+r.tax,0);
  
  csvData.push([]);
  csvData.push([
    'TOTAL',
    totAmount,
    totNet,
    totTax
  ]);
  
  exportToCsv(csvData, filename);
}

function exportToCsv(data, filename){
  const csv = data.map(row => row.map(cell => {
    if(cell === null || cell === undefined) return '';
    const value = String(cell).replace(/"/g, '""');
    return `"${value}"`;
  }).join(',')).join('\r\n');
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.setAttribute('href', url);
  link.setAttribute('download', filename);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  showToast('✓ Descargado en CSV');
}

init();
</script>
</body>
</html>
